<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .bg { fill: #f7f6f2; }
      .panel { fill: #fff; stroke: #222; stroke-width: 3; rx: 18; }
      .box { fill: #f2f4f7; stroke: #222; stroke-width: 2.2; rx: 10; }
      .blue { fill: #b9dcf4; }
      .green { fill: #bcebc8; }
      .yellow { fill: #ffe89a; }
      .purple { fill: #d7c4fb; }
      .pink { fill: #ffd0d0; }
      .title { font: 700 36px Arial, sans-serif; fill: #111; }
      .h2 { font: 700 25px Arial, sans-serif; fill: #111; }
      .text { font: 20px Arial, sans-serif; fill: #111; }
      .small { font: 16px Arial, sans-serif; fill: #111; }
      .mono { font: 18px "Liberation Mono", Consolas, monospace; fill: #111; }
      .arrow { stroke: #222; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#222"/>
    </marker>
  </defs>
  <rect class="bg" width="1500" height="980"/>
  <text x="750" y="58" text-anchor="middle" class="title">PPO update cheat sheet for your diagram</text>

  <rect x="70" y="104" width="1360" height="156" class="panel"/>
  <text x="110" y="150" class="h2">A. GAE should include done mask</text>
  <text x="110" y="196" class="mono">mask_t = 1 - done_t</text>
  <text x="520" y="196" class="mono">delta_t = r_t + gamma * V(s_{t+1}) * mask_t - V(s_t)</text>
  <text x="520" y="230" class="mono">A_t = delta_t + gamma * lambda * mask_t * A_{t+1}</text>

  <rect x="70" y="302" width="640" height="230" class="panel"/>
  <text x="110" y="348" class="h2">B. Ratio path</text>
  <rect x="112" y="382" width="230" height="70" class="box purple"/>
  <text x="227" y="424" text-anchor="middle" class="text">old log_prob</text>
  <rect x="410" y="382" width="230" height="70" class="box blue"/>
  <text x="525" y="414" text-anchor="middle" class="text">new log_prob</text>
  <text x="525" y="440" text-anchor="middle" class="small">of stored old action</text>
  <path d="M342 417 H410" class="arrow"/>
  <text x="112" y="492" class="mono">ratio = exp(new_log_prob - old_log_prob)</text>

  <rect x="790" y="302" width="640" height="230" class="panel"/>
  <text x="830" y="348" class="h2">C. KL path</text>
  <rect x="832" y="382" width="230" height="70" class="box purple"/>
  <text x="947" y="414" text-anchor="middle" class="text">old dist params</text>
  <text x="947" y="440" text-anchor="middle" class="small">mu/std etc.</text>
  <rect x="1130" y="382" width="230" height="70" class="box blue"/>
  <text x="1245" y="414" text-anchor="middle" class="text">new dist params</text>
  <text x="1245" y="440" text-anchor="middle" class="small">from current actor</text>
  <path d="M1062 417 H1130" class="arrow"/>
  <text x="832" y="492" class="mono">KL(old_dist, new_dist) -> adaptive learning rate</text>

  <rect x="70" y="574" width="640" height="276" class="panel"/>
  <text x="110" y="620" class="h2">D. Actor loss sign</text>
  <text x="110" y="670" class="mono">surrogate        = -A * ratio</text>
  <text x="110" y="706" class="mono">surrogate_clip   = -A * clamp(ratio, 1-eps, 1+eps)</text>
  <text x="110" y="742" class="mono">actor_loss       = mean(max(surrogate, surrogate_clip))</text>
  <rect x="110" y="778" width="520" height="42" class="box green"/>
  <text x="370" y="805" text-anchor="middle" class="small">Equivalent to PPO clipped objective, written as minimization loss</text>

  <rect x="790" y="574" width="640" height="276" class="panel"/>
  <text x="830" y="620" class="h2">E. Total loss</text>
  <text x="830" y="670" class="mono">value_loss = MSE(V_new, return)</text>
  <text x="830" y="706" class="mono">or clipped value loss using V_old</text>
  <text x="830" y="742" class="mono">loss = actor_loss + c1*value_loss - c2*entropy</text>
  <rect x="830" y="778" width="520" height="42" class="box yellow"/>
  <text x="1090" y="805" text-anchor="middle" class="small">Then backward, gradient clipping, optimizer step</text>

  <text x="750" y="918" text-anchor="middle" class="mono">Add to your drawing: done mask, timeout bootstrap, advantage normalization, value clipping, KL/adaptive LR.</text>
</svg>
