name: Wiki quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run wiki doctor
        run: scripts/wiki_doctor.sh
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Check deterministic research report
        run: python scripts/analyze_research_graph.py --check
