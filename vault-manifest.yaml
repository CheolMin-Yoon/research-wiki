schema_version: harness-v2

entry_files:
  - architecture.md
  - AI-Sessions/wiki/harness/state/brief.md

handoff_file: AI-Sessions/wiki/harness/state/handoff.md

top_level_groups:
  raw: AI-Sessions/raw/
  research: AI-Sessions/wiki/research/
  harness: AI-Sessions/wiki/harness/
  maps: AI-Sessions/wiki/maps/
  prompts: prompts/
  docs: .

allowed_research_dirs:
  - papers
  - sources
  - concepts
  - methods
  - tasks
  - ideas
  - experiments
  - comparisons

allowed_harness_dirs:
  - state
  - decisions
  - errors
  - patterns
  - archive
  - policies
  - templates
  - evals

research_schema:
  topic_registry: schema/research-topics.json
  validator: scripts/validate_research.py
  community_report: exports/research-communities.json
  stable_types:
    - concept
    - method
    - task
    - paper
    - source
    - comparison

commands:
  save: prompts/save.md
  reference: prompts/reference.md
  query: prompts/query.md
  ingest: prompts/ingest.md
  lint: prompts/lint.md
  reflect: prompts/reflect.md
  archive: prompts/archive.md

doctor:
  script: scripts/wiki_doctor.sh
  required_after:
    - structure_change
    - map_change
    - wikilink_update
    - archive
    - prompt_routing_change

state_limits:
  brief_max_lines: 80
  handoff_max_lines: 120
  log_max_lines: 30

# state(brief/handoff)는 포인터+현재상태만 두고 코드 메커니즘은 정본에 둔다.
state_purity:
  files:
    - AI-Sessions/wiki/harness/state/brief.md
    - AI-Sessions/wiki/harness/state/handoff.md
  # 구현 메커니즘 시그니처. 파일경로(.py/.md)·명령어·task id 같은 운용 참조는 제외.
  forbidden_token_regex: 'in_proj|nn\.[A-Za-z]|torch\.|[A-Za-z]_weight\b|MultiheadAttention|softmax|adjacency_matrix'

raw_policy:
  default: read_only
  graph_visible_wikilink_allowed: false

graph_registration:
  typed_research: frontmatter_and_bases
  harness: folder_hub
  raw_graph_links_allowed: false
  archive_active_hub_exposure_allowed: false
