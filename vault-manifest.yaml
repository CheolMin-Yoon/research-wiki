schema_version: harness-v1

entry_files:
  - architecture.md
  - AI-Sessions/wiki/harness/state/brief.md

handoff_file: AI-Sessions/wiki/harness/state/handoff.md

top_level_groups:
  raw: AI-Sessions/raw/
  research: AI-Sessions/wiki/research/
  harness: AI-Sessions/wiki/harness/
  maps: AI-Sessions/wiki/maps/
  prompts: prompts/
  docs: .

allowed_research_dirs:
  - papers
  - sources
  - categories
  - experiments

allowed_harness_dirs:
  - state
  - decisions
  - errors
  - patterns
  - archive
  - policies
  - templates
  - evals

# C4 whitelist mirror — wiki_doctor.sh C16이 script 상수와 이 목록의 drift를 WARN한다.
allowed_categories:
  - centroidal-wbc
  - rl-algorithms-frameworks
  - morphology-aware-policy
  - graph-transformer-rl
  - loco-manipulation
  - dynamics-guided-rl
  - novelty

commands:
  save: prompts/save.md
  reference: prompts/reference.md
  query: prompts/query.md
  ingest: prompts/ingest.md
  lint: prompts/lint.md
  reflect: prompts/reflect.md
  archive: prompts/archive.md

doctor:
  script: scripts/wiki_doctor.sh
  required_after:
    - structure_change
    - map_change
    - wikilink_update
    - archive
    - prompt_routing_change

state_limits:
  brief_max_lines: 80
  handoff_max_lines: 120
  log_max_lines: 30

# C13 state layer purity — state(brief/handoff)는 포인터+현재상태만 두고
# 코드 메커니즘(구현 디테일)은 정본(source/paper)에 두고 링크한다.
# wiki_doctor.sh C13이 script 상수를 사용하고, C16이 아래 regex와 drift를 WARN한다.
state_purity:
  files:
    - AI-Sessions/wiki/harness/state/brief.md
    - AI-Sessions/wiki/harness/state/handoff.md
  # 구현 메커니즘 시그니처. 파일경로(.py/.md)·명령어·task id 같은 운용 참조는 제외.
  forbidden_token_regex: 'in_proj|nn\.[A-Za-z]|torch\.|[A-Za-z]_weight\b|MultiheadAttention|softmax|adjacency_matrix'

raw_policy:
  default: read_only
  graph_visible_wikilink_allowed: false

graph_registration:
  required_for_new_active_docs: true
  raw_graph_links_allowed: false
  archive_active_hub_exposure_allowed: false
